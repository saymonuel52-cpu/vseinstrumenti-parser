name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  schedule:
    - cron: '0 2 * * *'  # Ежедневно в 2:00 UTC

env:
  DOTNET_VERSION: '8.0.x'
  DOTNET_CLI_TELEMETRY_OPTOUT: 1

jobs:
  build-and-test:
    name: Build and Test
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}

    - name: Restore dependencies
      run: dotnet restore

    - name: Build solution
      run: dotnet build --configuration Release --no-restore

    - name: Run unit tests
      run: dotnet test --configuration Release --no-build --verbosity normal --filter "Category=Unit"

    - name: Run integration tests
      run: dotnet test --configuration Release --no-build --verbosity normal --filter "Category=Integration"
      env:
        WIREMOCK_SERVER_URL: http://localhost:8080

    - name: Run all tests with coverage
      run: |
        dotnet test --configuration Release --no-build \
          --collect:"XPlat Code Coverage" \
          --results-directory ./coverage \
          --settings coverlet.runsettings

    - name: Upload test results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: test-results
        path: |
          **/TestResults/*.trx
          **/coverage/**/*

  code-quality:
    name: Code Quality
    runs-on: ubuntu-latest
    needs: build-and-test
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}

    - name: Run code analysis
      run: |
        dotnet build --configuration Release \
          -p:EnableNETAnalyzers=true \
          -p:AnalysisLevel=recommended

    - name: Run security scan
      run: |
        dotnet list package --vulnerable --include-transitive
        # Дополнительные проверки безопасности можно добавить здесь

    - name: Check for outdated packages
      run: |
        dotnet outdated --version-lock ignore

  publish:
    name: Publish Package
    runs-on: ubuntu-latest
    needs: [build-and-test, code-quality]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}

    - name: Create version tag
      id: version
      run: |
        VERSION=$(date +'%Y.%m.%d.%H%M')
        echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
        echo "Package version: $VERSION"

    - name: Pack NuGet package
      run: |
        dotnet pack --configuration Release \
          -p:PackageVersion=${{ steps.version.outputs.VERSION }} \
          -p:IncludeSymbols=true \
          -p:SymbolPackageFormat=snupkg \
          --output ./packages

    - name: Publish to GitHub Packages
      run: |
        dotnet nuget push ./packages/*.nupkg \
          --source https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json \
          --api-key ${{ secrets.GITHUB_TOKEN }} \
          --skip-duplicate

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v1
      with:
        tag_name: v${{ steps.version.outputs.VERSION }}
        name: Release v${{ steps.version.outputs.VERSION }}
        body: |
          Automated release from CI/CD pipeline
          
          Changes in this release:
          - See commit history for details
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  deploy:
    name: Deploy to Environment
    runs-on: ubuntu-latest
    needs: publish
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment: production
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}

    - name: Publish self-contained executable
      run: |
        dotnet publish --configuration Release \
          --runtime linux-x64 \
          --self-contained true \
          --output ./publish/linux-x64 \
          -p:PublishSingleFile=true \
          -p:PublishTrimmed=true \
          -p:EnableCompressionInSingleFile=true

        dotnet publish --configuration Release \
          --runtime win-x64 \
          --self-contained true \
          --output ./publish/win-x64 \
          -p:PublishSingleFile=true \
          -p:PublishTrimmed=true \
          -p:EnableCompressionInSingleFile=true

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: published-apps
        path: ./publish/
        retention-days: 7

    - name: Deploy to production server
      run: |
        # Настройка SSH
        mkdir -p ~/.ssh
        echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/id_rsa
        chmod 600 ~/.ssh/id_rsa
        
        # Добавление сервера в known_hosts (избегаем проверки хоста)
        ssh-keyscan -H ${{ secrets.DEPLOY_HOST }} >> ~/.ssh/known_hosts 2>/dev/null
        
        # Создание директории на сервере (если не существует)
        ssh -o StrictHostKeyChecking=no \
          ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} \
          "sudo mkdir -p /opt/vseinstrumenti-parser && sudo chown -R ${{ secrets.DEPLOY_USER }}:${{ secrets.DEPLOY_USER }} /opt/vseinstrumenti-parser"
        
        # Копирование файлов
        echo "Copying files to production server..."
        scp -o StrictHostKeyChecking=no -r ./publish/linux-x64/* \
          ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:/opt/vseinstrumenti-parser/
        
        # Копирование конфигурации production
        scp -o StrictHostKeyChecking=no appsettings.Production.json \
          ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:/opt/vseinstrumenti-parser/appsettings.json
        
        # Копирование systemd service файла (если нужно)
        echo "Copying systemd service file..."
        cat << 'EOF' > vseinstrumenti-parser.service
        [Unit]
        Description=Vseinstrumenti Parser Service
        After=network.target
        
        [Service]
        Type=exec
        WorkingDirectory=/opt/vseinstrumenti-parser
        ExecStart=/opt/vseinstrumenti-parser/VseinstrumentiParser
        Restart=always
        RestartSec=10
        KillSignal=SIGINT
        Environment=ASPNETCORE_ENVIRONMENT=Production
        Environment=DOTNET_PRINT_TELEMETRY_MESSAGE=false
        
        [Install]
        WantedBy=multi-user.target
        EOF
        
        scp -o StrictHostKeyChecking=no vseinstrumenti-parser.service \
          ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:/tmp/vseinstrumenti-parser.service
        
        # Настройка systemd и перезапуск службы
        echo "Setting up systemd service..."
        ssh -o StrictHostKeyChecking=no \
          ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} \
          "sudo mv /tmp/vseinstrumenti-parser.service /etc/systemd/system/ && \
           sudo systemctl daemon-reload && \
           sudo systemctl enable vseinstrumenti-parser && \
           sudo systemctl restart vseinstrumenti-parser"
        
        # Проверка статуса службы
        echo "Checking service status..."
        ssh -o StrictHostKeyChecking=no \
          ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} \
          "sudo systemctl status vseinstrumenti-parser --no-pager"
        
        # Очистка приватного ключа
        rm -f ~/.ssh/id_rsa
      env:
        DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
        DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
        DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}

  notify:
    name: Notify Status
    runs-on: ubuntu-latest
    needs: [build-and-test, publish, deploy]
    if: always()
    
    steps:
    - name: Send success notification
      if: success()
      uses: rtCamp/action-slack-notify@v2
      env:
        SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
        SLACK_CHANNEL: builds
        SLACK_COLOR: good
        SLACK_TITLE: '✅ CI/CD Pipeline Success'
        SLACK_MESSAGE: 'Build, test, and deploy completed successfully for ${{ github.repository }}'

    - name: Send failure notification
      if: failure()
      uses: rtCamp/action-slack-notify@v2
      env:
        SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
        SLACK_CHANNEL: builds
        SLACK_COLOR: danger
        SLACK_TITLE: '❌ CI/CD Pipeline Failed'
        SLACK_MESSAGE: 'Pipeline failed for ${{ github.repository }}. Check logs for details.'