version: '3.8'

services:
  # Основное приложение парсера
  vseinstrumenti-parser:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: vseinstrumenti-parser
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - Redis__ConnectionString=redis://redis:6379
      - OpenTelemetry__Endpoint=http://otel-collector:4317
      - Seq__ServerUrl=http://seq:5341
      - Prometheus__MetricsEndpoint=http://prometheus:9090
    volumes:
      - ./logs:/app/logs
      - ./exports:/app/exports
      - ./data:/app/data
      - ./monitoring:/app/monitoring
    depends_on:
      - redis
      - seq
      - otel-collector
    networks:
      - monitoring-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Redis для распределенного кэширования
  redis:
    image: redis:7-alpine
    container_name: redis-cache
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes
    networks:
      - monitoring-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  # Seq для структурированного логирования
  seq:
    image: datalust/seq:latest
    container_name: seq-logging
    restart: unless-stopped
    ports:
      - "5341:5341"
      - "8081:80"
    environment:
      - ACCEPT_EULA=Y
    volumes:
      - seq-data:/data
    networks:
      - monitoring-network

  # OpenTelemetry Collector для сбора телеметрии
  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    container_name: otel-collector
    restart: unless-stopped
    ports:
      - "4317:4317"   # OTLP gRPC
      - "4318:4318"   # OTLP HTTP
      - "8888:8888"   # Prometheus metrics exposed by the collector
      - "8889:8889"   # Prometheus exporter metrics
      - "13133:13133" # Health check
      - "55679:55679" # zPages
    volumes:
      - ./otel-collector-config.yaml:/etc/otelcol-contrib/config.yaml
    command: ["--config=/etc/otelcol-contrib/config.yaml"]
    networks:
      - monitoring-network

  # Prometheus для сбора метрик
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--storage.tsdb.retention.time=200h'
      - '--web.enable-lifecycle'
    networks:
      - monitoring-network

  # Grafana для визуализации метрик
  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_INSTALL_PLUGINS=grafana-piechart-panel
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning
      - ./grafana/dashboards:/var/lib/grafana/dashboards
    networks:
      - monitoring-network
    depends_on:
      - prometheus

  # cAdvisor для мониторинга контейнеров
  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    container_name: cadvisor
    restart: unless-stopped
    ports:
      - "8082:8080"
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    privileged: true
    devices:
      - /dev/kmsg
    networks:
      - monitoring-network

  # Планировщик периодического парсинга через cron
  parser-scheduler:
    image: alpine:latest
    container_name: parser-scheduler
    restart: unless-stopped
    environment:
      - PARSER_URL=http://vseinstrumenti-parser:8080
      - CRON_SCHEDULE=0 */6 * * *   # Каждые 6 часов
      - HEALTH_CHECK_URL=http://vseinstrumenti-parser:8080/health
    volumes:
      - ./scripts/parser-scheduler.sh:/usr/local/bin/parser-scheduler.sh
    entrypoint: /bin/sh
    command: -c "apk add --no-cache curl && chmod +x /usr/local/bin/parser-scheduler.sh && crond -f -l 8"
    networks:
      - monitoring-network
    depends_on:
      - vseinstrumenti-parser
    healthcheck:
      test: ["CMD", "pgrep", "cron"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  redis-data:
  seq-data:
  prometheus-data:
  grafana-data:

networks:
  monitoring-network:
    driver: bridge